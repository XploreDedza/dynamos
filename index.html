<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goshen City Dedza Dynamos FC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C800;
    --gold-dark: #C49D00;
    --gold-glow: #FFD700;
    --black: #0A0A0A;
    --black-2: #111111;
    --black-3: #1A1A1A;
    --black-4: #242424;
    --white: #FFFFFF;
    --off-white: #F0EDDF;
    --gray: #888;
    --gray-light: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    height: 70px;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid rgba(245,200,0,0.15);
    backdrop-filter: blur(10px);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 12px; text-decoration: none;
  }
  .nav-crest {
    width: 44px; height: 44px;
  }
  .nav-name {
    display: flex; flex-direction: column; line-height: 1;
  }
  .nav-name span:first-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold); letter-spacing: 2px;
  }
  .nav-name span:last-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; color: var(--gray); letter-spacing: 3px; text-transform: uppercase;
  }

  .nav-links {
    display: flex; gap: 32px; list-style: none;
  }
  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gray);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--black);
    background: var(--gold); border: none; cursor: pointer;
    padding: 10px 24px; text-decoration: none;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--gold-glow); }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex; align-items: center;
    overflow: hidden;
    background: var(--black);
  }

  .hero-bg-stripes {
    position: absolute; inset: 0; z-index: 0;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 40px,
      rgba(245,200,0,0.018) 40px,
      rgba(245,200,0,0.018) 41px
    );
  }

  .hero-accent-line {
    position: absolute;
    top: 0; bottom: 0;
    right: 38%;
    width: 3px;
    background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    z-index: 1;
  }

  .hero-number {
    position: absolute;
    right: 2%;
    bottom: -2%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40vw;
    line-height: 0.8;
    color: rgba(245,200,0,0.04);
    z-index: 0;
    user-select: none;
    letter-spacing: -5px;
  }

  .hero-content {
    position: relative; z-index: 2;
    padding: 0 5vw;
    padding-top: 70px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 60px; align-items: center;
    width: 100%; max-width: 1400px; margin: 0 auto;
  }

  .hero-left {}

  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(245,200,0,0.1);
    border: 1px solid rgba(245,200,0,0.3);
    padding: 6px 14px; margin-bottom: 24px;
  }
  .hero-badge-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hero-badge span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 7vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .hero-title .gold { color: var(--gold); }
  .hero-title .outline {
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
    color: transparent;
  }

  .hero-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 400; letter-spacing: 5px;
    text-transform: uppercase; color: var(--gray);
    margin-bottom: 40px; margin-top: 10px;
  }

  .hero-stats {
    display: flex; gap: 40px; margin-bottom: 40px;
  }
  .hero-stat-item { display: flex; flex-direction: column; }
  .hero-stat-item .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; line-height: 1; color: var(--gold);
  }
  .hero-stat-item .lbl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gray);
  }

  .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }

  .btn-primary {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--black);
    background: var(--gold); border: none; cursor: pointer;
    padding: 14px 36px; text-decoration: none;
    display: inline-block; transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--gold-glow); transform: translateY(-1px); }

  .btn-outline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold);
    background: transparent; border: 1px solid var(--gold);
    cursor: pointer; padding: 14px 36px; text-decoration: none;
    display: inline-block; transition: all 0.2s;
  }
  .btn-outline:hover { background: rgba(245,200,0,0.1); transform: translateY(-1px); }

  .hero-right {
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  .hero-crest-wrap {
    position: relative; width: 340px; height: 340px;
    display: flex; align-items: center; justify-content: center;
  }

  .hero-crest-ring {
    position: absolute; inset: 0;
    border: 1px solid rgba(245,200,0,0.2);
    border-radius: 50%;
    animation: spin 20s linear infinite;
  }
  .hero-crest-ring::before {
    content: '';
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--gold); border-radius: 50%;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hero-crest-ring-2 {
    position: absolute; inset: 20px;
    border: 1px solid rgba(245,200,0,0.1);
    border-radius: 50%;
    animation: spin 30s linear infinite reverse;
  }

  .crest-svg { width: 200px; height: 200px; position: relative; z-index: 2; }

  /* ─── TICKER ─── */
  .ticker {
    background: var(--gold);
    padding: 10px 0; overflow: hidden;
    position: relative;
  }
  .ticker-inner {
    display: flex; gap: 60px;
    animation: ticker 25s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  .ticker-inner span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--black);
  }
  .ticker-dot { color: var(--black); opacity: 0.4; }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ─── SECTION BASE ─── */
  section { padding: 100px 5vw; max-width: 1400px; margin: 0 auto; }
  .section-full { padding: 100px 5vw; }

  .section-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 4px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-eyebrow::before {
    content: ''; display: block;
    width: 24px; height: 1px; background: var(--gold);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 4vw, 60px);
    letter-spacing: 2px; line-height: 1;
    color: var(--white);
    margin-bottom: 8px;
  }
  .section-title .gold { color: var(--gold); }

  .section-desc {
    font-size: 15px; color: var(--gray); line-height: 1.7;
    max-width: 540px; margin-bottom: 50px;
    font-weight: 300;
  }

  /* ─── FIXTURES ─── */
  .fixtures-bg {
    background: var(--black-2);
    width: 100%;
  }

  .fixtures-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: rgba(255,255,255,0.05);
    margin-top: 40px;
  }

  .fixture-card {
    background: var(--black-2);
    padding: 28px 32px;
    display: flex; align-items: center; gap: 20px;
    border-left: 3px solid transparent;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .fixture-card:hover {
    border-left-color: var(--gold);
    background: var(--black-3);
  }
  .fixture-card.next { border-left-color: var(--gold); }

  .fixture-date {
    display: flex; flex-direction: column; align-items: center;
    min-width: 52px;
  }
  .fixture-date .day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; line-height: 1; color: var(--gold);
  }
  .fixture-date .month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gray);
  }

  .fixture-divider { width: 1px; height: 50px; background: rgba(255,255,255,0.08); }

  .fixture-info { flex: 1; }
  .fixture-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 1px;
    color: var(--white); margin-bottom: 4px;
  }
  .fixture-teams span { color: var(--gold); }
  .fixture-meta {
    font-size: 12px; color: var(--gray); letter-spacing: 1px;
  }

  .fixture-result {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px;
    color: var(--white); min-width: 60px; text-align: right;
  }
  .fixture-result.win { color: var(--gold); }
  .fixture-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold); color: var(--black);
    padding: 3px 8px;
  }

  /* ─── SQUAD ─── */
  .squad-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2px; margin-top: 40px;
  }

  .player-card {
    background: var(--black-3);
    aspect-ratio: 3/4;
    position: relative; overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column; justify-content: flex-end;
  }

  .player-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--black-3) 0%, var(--black-4) 100%);
  }

  .player-number {
    position: absolute; top: 16px; right: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; line-height: 1;
    color: rgba(245,200,0,0.15);
    z-index: 1;
  }

  .player-position-badge {
    position: absolute; top: 16px; left: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold); color: var(--black);
    padding: 3px 8px; z-index: 2;
  }

  .player-avatar {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }

  .player-silhouette {
    width: 110px; height: 140px;
    opacity: 0.35;
  }

  .player-info {
    position: relative; z-index: 3;
    background: linear-gradient(to top, rgba(10,10,10,0.98) 0%, transparent 100%);
    padding: 40px 16px 16px;
  }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--white);
  }

  .player-role {
    font-size: 11px; color: var(--gold); letter-spacing: 1px;
    font-weight: 400;
  }

  .player-card::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(245,200,0,0.08);
    opacity: 0; transition: opacity 0.2s; z-index: 4;
  }
  .player-card:hover::after { opacity: 1; }

  /* ─── NEWS ─── */
  .news-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 2px;
    margin-top: 40px;
  }

  .news-card {
    background: var(--black-3);
    position: relative; overflow: hidden; cursor: pointer;
  }

  .news-card-img {
    height: 280px; overflow: hidden;
  }
  .news-card:nth-child(2) .news-card-img,
  .news-card:nth-child(3) .news-card-img { height: 160px; }

  .news-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px; color: rgba(245,200,0,0.07);
    letter-spacing: 4px;
  }

  .news-card:nth-child(1) .news-img-placeholder { font-size: 120px; }

  .news-content { padding: 24px; }

  .news-category {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 8px;
  }

  .news-headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; line-height: 1.2;
    letter-spacing: 0.5px; color: var(--white);
    margin-bottom: 8px;
  }
  .news-card:nth-child(2) .news-headline,
  .news-card:nth-child(3) .news-headline { font-size: 16px; }

  .news-date {
    font-size: 12px; color: var(--gray);
  }

  .news-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s;
  }
  .news-card:hover::after { transform: scaleX(1); }

  /* ─── TICKETS ─── */
  .tickets-section {
    background: linear-gradient(135deg, var(--black) 0%, #1a1500 50%, var(--black) 100%);
    padding: 100px 5vw;
    position: relative; overflow: hidden;
  }

  .tickets-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(245,200,0,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .tickets-inner {
    max-width: 1400px; margin: 0 auto; position: relative; z-index: 1;
  }

  .tickets-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
    margin-top: 50px;
  }

  .ticket-card {
    background: var(--black-3);
    border: 1px solid rgba(245,200,0,0.1);
    padding: 40px;
    display: flex; flex-direction: column;
    gap: 20px; position: relative; overflow: hidden;
    cursor: pointer; transition: border-color 0.2s, transform 0.2s;
  }
  .ticket-card:hover {
    border-color: rgba(245,200,0,0.4);
    transform: translateY(-2px);
  }

  .ticket-card.featured {
    border-color: var(--gold);
  }

  .ticket-corner {
    position: absolute; top: 0; right: 0;
    width: 0; height: 0;
    border-top: 40px solid var(--gold);
    border-left: 40px solid transparent;
  }

  .ticket-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
  }

  .ticket-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 2px; line-height: 1;
    color: var(--white);
  }

  .ticket-desc {
    font-size: 14px; color: var(--gray); line-height: 1.6; font-weight: 300;
  }

  .ticket-price {
    display: flex; align-items: baseline; gap: 6px;
  }
  .ticket-price .currency {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 600; color: var(--gold);
  }
  .ticket-price .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; line-height: 1; color: var(--white);
  }
  .ticket-price .period {
    font-size: 13px; color: var(--gray);
  }

  .ticket-perks {
    list-style: none; display: flex; flex-direction: column; gap: 8px;
  }
  .ticket-perks li {
    font-size: 13px; color: var(--off-white); font-weight: 300;
    display: flex; align-items: center; gap: 8px;
  }
  .ticket-perks li::before {
    content: '';
    display: block; width: 5px; height: 5px;
    background: var(--gold); flex-shrink: 0;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }

  .btn-ticket {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    padding: 14px 0; text-align: center;
    border: none; text-decoration: none; display: block;
    transition: all 0.2s;
  }
  .btn-ticket.dark {
    background: var(--gold); color: var(--black);
  }
  .btn-ticket.dark:hover { background: var(--gold-glow); }
  .btn-ticket.light {
    background: transparent; color: var(--gold);
    border: 1px solid rgba(245,200,0,0.3);
  }
  .btn-ticket.light:hover { border-color: var(--gold); background: rgba(245,200,0,0.05); }

  .eventcore-banner {
    margin-top: 16px;
    padding: 12px 20px;
    background: rgba(245,200,0,0.05);
    border: 1px solid rgba(245,200,0,0.15);
    display: flex; align-items: center; gap: 12px;
  }
  .eventcore-banner svg { flex-shrink: 0; }
  .eventcore-banner p {
    font-size: 12px; color: var(--gray); line-height: 1.5;
  }
  .eventcore-banner p strong {
    color: var(--gold); font-weight: 600;
  }

  /* ─── MERCH ─── */
  .merch-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    margin-top: 40px;
  }

  .merch-card {
    background: var(--black-3);
    cursor: pointer; overflow: hidden;
    transition: transform 0.2s;
  }
  .merch-card:hover { transform: scale(1.01); }

  .merch-img {
    aspect-ratio: 1;
    background: var(--black-4);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  .merch-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; color: rgba(245,200,0,0.12);
    letter-spacing: 2px;
  }

  .merch-img .kit-design {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .merch-info { padding: 16px; }
  .merch-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--white); margin-bottom: 4px;
  }
  .merch-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold); letter-spacing: 1px;
  }

  .merch-badge {
    position: absolute; top: 10px; left: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold); color: var(--black); padding: 3px 8px;
    z-index: 2;
  }

  /* ─── FOOTER ─── */
  footer {
    background: var(--black);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 60px 5vw 30px;
  }

  .footer-inner {
    max-width: 1400px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px;
    margin-bottom: 50px;
  }

  .footer-brand {}
  .footer-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .footer-tagline {
    font-size: 13px; color: var(--gray); line-height: 1.7; font-weight: 300;
    max-width: 280px; margin-bottom: 20px;
  }

  .footer-socials { display: flex; gap: 12px; }
  .social-btn {
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
